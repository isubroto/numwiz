name: Release and Publish

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      contents: write
      issues: write
      packages: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Coverage
        run: npm run coverage

      - name: Build
        run: npm run build

      - name: Validate package
        run: npm run package:validate

      - name: Install semantic-release
        run: |
          npm install --no-save \
            semantic-release \
            @semantic-release/git \
            @semantic-release/npm \
            @semantic-release/github \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/changelog \
            @semantic-release/exec

      - name: Run semantic-release
        id: release
        run: npx semantic-release --branches main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Get latest tag
        id: latest_tag
        run: |
          if git describe --tags --abbrev=0 > /dev/null 2>&1; then
            LATEST_TAG=$(git describe --tags --abbrev=0)
          else
            LATEST_TAG="v0.0.0"
          fi
          echo "LATEST_TAG=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      - name: Update GitHub release notes
        if: steps.latest_tag.outputs.LATEST_TAG != 'v0.0.0'
        run: |
          LATEST_TAG="${{ steps.latest_tag.outputs.LATEST_TAG }}"
          REPO="${{ github.repository }}"
          BUILD_ID="${{ github.run_id }}"
          COMMIT_SHA="${{ github.sha }}"

          RELEASE_NOTES=$(gh release view "$LATEST_TAG" --repo "$REPO" --json body -q '.body' 2>/dev/null || echo "")
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD)
            FILES_CHANGED=$(git diff --name-only "$PREV_TAG"..HEAD | head -20)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" -10)
            FILES_CHANGED=$(git diff --name-only HEAD~10..HEAD 2>/dev/null | head -20)
          fi

          NODE_VERSION=$(node -v)
          RELEASE_DATE=$(date +'%Y-%m-%d %H:%M:%S UTC')
          PACKAGE_SIZE=$(npm pack --dry-run 2>&1 | grep "total files" || echo "N/A")

          cat > release_notes.md <<EOF
          $RELEASE_NOTES

          ---

          ## Installation

          \`\`\`bash
          npm install numwiz
          # or
          yarn add numwiz
          # or
          pnpm add numwiz
          \`\`\`

          ## Changes in this release

          ### Commits
          $COMMITS

          ### Changed files
          \`\`\`
          ${FILES_CHANGED}
          \`\`\`

          ## Technical details

          | Detail | Value |
          | ------ | ----- |
          | Release date | $RELEASE_DATE |
          | Node.js | $NODE_VERSION |
          | Package preview | $PACKAGE_SIZE |
          | Build ID | [$BUILD_ID](https://github.com/$REPO/actions/runs/$BUILD_ID) |
          | Commit | \`${COMMIT_SHA:0:7}\` |

          ## Links

          - [Documentation](https://github.com/$REPO#readme)
          - [NPM package](https://www.npmjs.com/package/numwiz)
          - [Changelog](https://github.com/$REPO/blob/main/CHANGELOG.md)
          - [Report issues](https://github.com/$REPO/issues)
          EOF

          gh release edit "$LATEST_TAG" \
            --repo "$REPO" \
            --notes-file release_notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release complete
        run: |
          echo "Release complete"
          echo "Package: numwiz"
          echo "NPM: https://www.npmjs.com/package/numwiz"
